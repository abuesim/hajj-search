<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>بحث حجاج يسر مساند</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #0d4f3c 0%, #1a7a5e 50%, #0d4f3c 100%);
    min-height: 100vh;
    padding: 0 0 40px;
  }

  header {
    background: rgba(0,0,0,0.25);
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  header h1 {
    color: #f5d06e;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .kaaba-icon {
    font-size: 1.5rem;
  }

  .search-wrap {
    position: relative;
  }

  #searchInput {
    width: 100%;
    padding: 14px 48px 14px 16px;
    border-radius: 14px;
    border: 2px solid rgba(245,208,110,0.4);
    background: rgba(255,255,255,0.95);
    font-size: 1.05rem;
    color: #1a1a1a;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    text-align: right;
  }

  #searchInput:focus {
    border-color: #f5d06e;
    box-shadow: 0 0 0 3px rgba(245,208,110,0.2);
  }

  #searchInput::placeholder {
    color: #999;
    font-size: 0.95rem;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #1a7a5e;
    font-size: 1.2rem;
    pointer-events: none;
  }

  .clear-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: #ddd;
    border: none;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    font-size: 0.85rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    color: #666;
  }

  .clear-btn.visible { display: flex; }

  .hint {
    color: rgba(255,255,255,0.6);
    font-size: 0.75rem;
    margin-top: 8px;
    text-align: center;
  }

  #results {
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  .state-msg {
    text-align: center;
    color: rgba(255,255,255,0.7);
    margin-top: 60px;
    font-size: 1rem;
  }

  .state-msg .icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 12px;
  }

  /* Main result card */
  .result-card {
    background: white;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    margin-bottom: 20px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    background: linear-gradient(135deg, #1a7a5e, #0d4f3c);
    padding: 18px 18px 14px;
    color: white;
  }

  .pilgrim-name {
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1.4;
    color: #f5d06e;
    margin-bottom: 4px;
  }

  .pilgrim-label {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card-body {
    padding: 16px 18px;
    display: flex;
    gap: 12px;
  }

  .info-box {
    flex: 1;
    background: #f8fffe;
    border-radius: 12px;
    padding: 12px 14px;
    text-align: center;
    border: 1.5px solid #e0f5ef;
  }

  .info-box .label {
    font-size: 0.7rem;
    color: #888;
    display: block;
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .info-box .value {
    font-size: 1.35rem;
    font-weight: 800;
    color: #0d4f3c;
    direction: ltr;
    display: block;
  }

  .info-box.bus .value {
    font-size: 2rem;
    color: #e07b00;
  }

  .info-box.bus {
    border-color: #fde8c0;
    background: #fffbf3;
  }

  /* Group section */
  .group-banner {
    background: linear-gradient(90deg, #e07b00, #f5a623);
    color: white;
    text-align: center;
    padding: 8px 16px;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .group-list {
    padding: 10px 14px 14px;
  }

  .group-member {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.15s;
  }

  .group-member:last-child { border-bottom: none; }
  .group-member.is-self { background: #edfaf5; }

  .member-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #1a7a5e;
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .member-num.self {
    background: #f5d06e;
    color: #0d4f3c;
  }

  .member-name {
    font-size: 0.92rem;
    color: #1a1a1a;
    font-weight: 500;
    flex: 1;
  }

  .you-badge {
    font-size: 0.65rem;
    background: #1a7a5e;
    color: white;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 700;
  }

  .no-result {
    text-align: center;
    margin-top: 60px;
    color: rgba(255,255,255,0.8);
    animation: fadeUp 0.25s ease;
  }

  .no-result .icon { font-size: 3rem; display: block; margin-bottom: 12px; }
  .no-result p { font-size: 1.05rem; }
  .no-result small { font-size: 0.82rem; color: rgba(255,255,255,0.55); margin-top: 6px; display: block; }

  .count-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.9);
    margin-top: 8px;
  }
</style>
</head>

<header>

// Build lookup index
const byId = {};
const byPhone = {};
const byResv = {};

DATA.forEach(p => {
  if (p.id) {
    (byId[p.id] = byId[p.id] || []).push(p);
  }
  if (p.phone) {
    (byPhone[p.phone] = byPhone[p.phone] || []).push(p);
  }
  if (p.resv) {
    (byResv[p.resv] = byResv[p.resv] || []).push(p);
  }
});

const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const resultsDiv = document.getElementById('results');

let debounceTimer;

input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doSearch, 200);
  clearBtn.classList.toggle('visible', input.value.length > 0);
});

function clearSearch() {
  input.value = '';
  clearBtn.classList.remove('visible');
  showEmpty();
  input.focus();
}

function normalize(s) {
  if (!s) return '';
  return s.replace(/[أإآ]/g, 'ا').replace(/ى/g, 'ي').replace(/ة/g, 'ه').toLowerCase().trim();
}

function doSearch() {
  const q = input.value.trim();
  if (!q) { showEmpty(); return; }
  if (q.length < 2) {
    resultsDiv.innerHTML = '<div class="state-msg"><span class="icon">✍️</span><p>اكتب أكثر للبحث...</p></div>';
    return;
  }

  let matches = [];

  // Exact ID match
  if (byId[q]) matches = [...byId[q]];

  // Exact phone match
  if (!matches.length && byPhone[q]) matches = [...byPhone[q]];

  // Phone with leading 0 added/removed
  if (!matches.length) {
    const altPhone = q.startsWith('0') ? q.slice(1) : '0' + q;
    if (byPhone[altPhone]) matches = [...byPhone[altPhone]];
  }

  // Name search (partial, normalized)
  if (!matches.length) {
    const nq = normalize(q);
    matches = DATA.filter(p => normalize(p.name).includes(nq));
  }

  // Partial ID
  if (!matches.length && /^\d+$/.test(q)) {
    matches = DATA.filter(p => p.id.includes(q));
  }

  if (!matches.length) {
    resultsDiv.innerHTML = `
      <div class="no-result">
        <span class="icon">😔</span>
        <p>لا توجد نتائج لـ "<strong>${q}</strong>"</p>
        <small>تأكد من صحة الاسم أو رقم الهوية أو الجوال</small>
      </div>`;
    return;
  }

  // Deduplicate by name+resv
  const seen = new Set();
  matches = matches.filter(p => {
    const key = p.name + p.resv;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });

  let html = '';
  if (matches.length > 1) {
    html += `<div style="text-align:center;margin-bottom:12px">
      <span class="count-badge" style="background:rgba(255,255,255,0.15);color:white;display:inline-block;border-radius:20px;padding:4px 14px;font-size:0.82rem">
        تم العثور على <strong>${matches.length}</strong> نتيجة
      </span>
    </div>`;
  }

  matches.slice(0, 20).forEach(p => {
    const groupMembers = byResv[p.resv] || [];
    const hasGroup = groupMembers.length > 1;
    const busDisplay = p.bus || '—';
    const resvDisplay = p.resv || '—';

    html += `<div class="result-card">
      <div class="card-header">
        <div class="pilgrim-label">الحاج / الحاجة</div>
        <div class="pilgrim-name">${p.name}</div>
      </div>
      <div class="card-body">
        <div class="info-box">
          <span class="label">رقم الحجز</span>
          <span class="value" style="font-size:1.15rem">${resvDisplay}</span>
        </div>
        <div class="info-box bus">
          <span class="label">الباص</span>
          <span class="value">${busDisplay}</span>
        </div>
      </div>`;

    if (hasGroup) {
      html += `<div class="group-banner">
        <span>👥</span> رفقاء الحجز · ${groupMembers.length} أشخاص
      </div>
      <div class="group-list">`;
      groupMembers.forEach((m, i) => {
        const isSelf = m.name === p.name;
        html += `<div class="group-member${isSelf ? ' is-self' : ''}">
          <div class="member-num${isSelf ? ' self' : ''}">${i+1}</div>
          <div class="member-name">${m.name}</div>
          ${isSelf ? '<span class="you-badge">أنت</span>' : ''}
        </div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  });

  if (matches.length > 20) {
    html += `<p style="text-align:center;color:rgba(255,255,255,0.6);font-size:0.85rem;margin-top:8px">
      يُعرض أول 20 نتيجة — يُرجى تضييق البحث
    </p>`;
  }

  resultsDiv.innerHTML = html;
}

function showEmpty() {
  resultsDiv.innerHTML = `<div class="state-msg">
    <span class="icon">🔍</span>
    <p>ابحث عن الحاج للعثور على معلومات الحجز والباص</p>
  </div>`;
}

// Auto-focus on desktop
if (window.innerWidth > 768) input.focus();
</script>
